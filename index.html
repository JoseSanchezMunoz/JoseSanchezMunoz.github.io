<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Portfolio profesional QA Tester de José Sánchez Muñoz. Testing manual, automatización, APIs, SQL y calidad de software.">
    <meta name="author" content="José Sánchez Muñoz">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#f8fafc">

    <title>José Sánchez Muñoz | QA Tester Portfolio</title>

    <link rel="icon" href="assets/img/LogoQA-sinfondo.png">

    <script>
        const savedTheme = localStorage.getItem("portfolio-theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = savedTheme || systemTheme;

        const savedLang = localStorage.getItem("portfolio-lang");
        const lang = savedLang || "es";

        document.documentElement.lang = lang;
        document.documentElement.dataset.lang = lang;
    </script>

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header class="site-header">
        <nav class="navbar" aria-label="Navegación principal">
            <button class="nav-toggle" type="button" aria-label="Abrir menú" aria-controls="nav-menu"
                aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="nav-panel" id="nav-menu">
                <ul class="nav-menu">
                    <li><a class="nav-link" href="#home" data-i18n="nav.home"></a></li>
                    <li><a class="nav-link" href="#about" data-i18n="nav.about"></a></li>
                    <li><a class="nav-link" href="#skills" data-i18n="nav.skills"></a></li>
                    <li><a class="nav-link" href="#experience" data-i18n="nav.experience"></a></li>
                    <li><a class="nav-link" href="#projects" data-i18n="nav.projects"></a></li>
                    <li><a class="nav-link" href="#certifications" data-i18n="nav.certifications"></a></li>
                    <li><a class="nav-link" href="#contact" data-i18n="nav.contact"></a></li>
                </ul>

                <div class="header-actions" aria-label="Preferencias">
                    <div class="segmented-control" role="group" aria-label="Idioma">
                        <button class="control-button" type="button" data-lang-option="es">ES</button>
                        <button class="control-button" type="button" data-lang-option="en">EN</button>
                    </div>

                    <button class="icon-button theme-toggle" type="button" aria-label="Cambiar tema"
                        title="Cambiar tema">
                        <span class="theme-toggle-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero section" id="home">
            <div class="hero-media" aria-hidden="true"></div>

            <div class="hero-inner">
                <div class="hero-copy">
                    <p class="eyebrow" data-i18n="hero.eyebrow"></p>

                    <h1 data-i18n="hero.title">José Sánchez Muñoz</h1>

                    <p class="hero-summary" data-i18n="hero.summary"></p>

                    <div class="hero-actions">
                        <a class="button button-primary" href="#projects" data-i18n="hero.primaryCta"></a>

                        <a class="button button-secondary" href="#contact" data-i18n="hero.secondaryCta"></a>

                        <a class="button button-secondary" href="https://github.com/JoseSanchezMunoz" target="_blank"
                            rel="noreferrer" aria-label="GitHub">
                            GitHub
                        </a>

                        <a class="button button-secondary"
                            href="https://www.linkedin.com/in/jose-anderson-sanchez-munoz/" target="_blank"
                            rel="noreferrer" aria-label="LinkedIn">
                            LinkedIn
                        </a>
                    </div>
                </div>

                <aside class="profile-panel" aria-label="Resumen profesional">
                    <img class="profile-photo" src="assets/img/Perfil.jpg" loading="eager" fetchpriority="high">

                    <div>
                        <p class="profile-role" data-i18n="hero.role"></p>
                        <p class="profile-note" data-i18n="hero.note"></p>
                    </div>
                </aside>
            </div>
        </section>

        <section class="section about" id="about">
            <div class="section-heading">
                <h2 data-i18n="nav.about"></h2>
                <p class="section-lead" data-i18n="about.title"></p>
            </div>

            <div class="about-content">
                <div class="facts-grid" id="facts-grid" aria-label="Datos clave"></div>
            </div>

            <div class="analysis-process">
                <div class="process-intro">
                    <h3 data-i18n="about.processHeading"></h3>
                    <p data-i18n="about.processText"></p>
                </div>

                <div class="process-grid" id="analysis-process-grid"></div>
            </div>
        </section>

        <section class="section skills" id="skills">
            <div class="section-heading">
                <h2 data-i18n="nav.skills"></h2>
                <p class="section-lead" data-i18n="skills.title"></p>
            </div>

            <div class="skills-grid" id="skills-grid"></div>
        </section>

        <section class="section experience" id="experience">
            <div class="section-heading">
                <h2 data-i18n="nav.experience"></h2>
                <p class="section-lead" data-i18n="experience.title"></p>
            </div>

            <div class="experience-list" id="experience-list"></div>
        </section>

        <section class="section projects" id="projects">
            <div class="section-heading">
                <h2 data-i18n="nav.projects"></h2>
                <p class="section-lead" data-i18n="projects.title"></p>
            </div>

            <div class="projects-grid" id="projects-grid"></div>
        </section>

        <section class="section certifications" id="certifications">
            <div class="section-heading">
                <h2 data-i18n="nav.certifications"></h2>
                <p class="section-lead" data-i18n="certifications.title"></p>
            </div>

            <div class="timeline" id="certifications-list"></div>
        </section>

        <section class="section contact" id="contact">
            <div class="section-heading">
                <h2 data-i18n="nav.contact"></h2>
                <p class="section-lead" data-i18n="contact.title"></p>
            </div>

            <div class="contact-layout">
                <div class="contact-copy">
                    <div class="contact-profile">
                        <div class="contact-availability" data-i18n="contact.availability"></div>

                        <h3 data-i18n="contact.roleTitle"></h3>

                        <p data-i18n="contact.text"></p>

                        <div class="contact-links">
                            <a href="https://github.com/JoseSanchezMunoz" target="_blank" rel="noreferrer">
                                GitHub
                            </a>

                            <a href="https://www.linkedin.com/in/jose-anderson-sanchez-munoz/" target="_blank"
                                rel="noreferrer">
                                LinkedIn
                            </a>
                        </div>
                    </div>
                </div>

                <div class="contact-card">
                    <div class="contact-card-content">
                        <div class="contact-icon">
                            ✉
                        </div>

                        <h3 data-i18n="contact.cardTitle"></h3>

                        <p data-i18n="contact.cardText"></p>

                        <a class="button button-primary mailto-button"
                            href="mailto:josesanchezmunoz056@gmail.com?subject=Oportunidad%20QA&body=Hola Jose, somos de la empresa ... queremos comentarte sobre una oportunidad laboral ..."
                            aria-label="Enviar correo" data-i18n="contact.emailButton"></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p data-i18n="footer.copy"></p>
            <a href="#home" data-i18n="footer.back"></a>
        </div>
    </footer>

    <script defer src="js/config/storage-keys.js"></script>
    <script defer src="js/data/translations.js"></script>
    <script defer src="js/utils/object.js"></script>
    <script defer src="js/ui/theme.js"></script>
    <script defer src="js/ui/carousel.js"></script>
    <script defer src="js/ui/renderers.js"></script>
    <script defer src="js/app/i18n.js"></script>
    <script defer src="js/app/preferences.js"></script>
    <script defer src="js/ui/navigation.js"></script>
    <script defer src="js/main.js"></script>
</body>

</html>
